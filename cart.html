<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Gir Govalan</title>
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-hero">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your items and place your order via WhatsApp or contact us.</p>
    </div>
  </div>

  <section>
    <div class="container" id="cart-root"></div>
  </section>

  <div id="site-footer"></div>
  <button class="scroll-top" aria-label="Back to top">↑</button>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const root = document.getElementById('cart-root');

      if (!cart.length) {
        root.innerHTML = `
          <div class="cart-empty">
            <h2>Your cart is empty</h2>
            <p>Discover our authentic Gir cow ghee and farm-fresh products.</p>
            <a href="products.html" class="btn btn-primary">Shop Products</a>
          </div>`;
        return;
      }

      root.innerHTML = `
        <table class="cart-table">
          <thead>
            <tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>
          </thead>
          <tbody>
            ${cart.map(item => `
              <tr data-key="${item.key}">
                <td>
                  <div class="cart-product">
                    <img src="${item.image}" alt="">
                    <div>
                      <strong>${item.name}</strong>
                      ${item.variant ? `<br><small>${item.variant}</small>` : ''}
                    </div>
                  </div>
                </td>
                <td>${formatPrice(item.price)}</td>
                <td>
                  <div class="qty-row">
                    <button type="button" class="qty-btn cart-minus" data-key="${item.key}">−</button>
                    <span>${item.qty}</span>
                    <button type="button" class="qty-btn cart-plus" data-key="${item.key}">+</button>
                  </div>
                </td>
                <td>${formatPrice(item.price * item.qty)}</td>
                <td><button type="button" class="btn btn-sm btn-outline cart-remove" data-key="${item.key}">Remove</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="cart-summary">
          <h3>Order summary</h3>
          <p><strong>Subtotal:</strong> ${formatPrice(cartTotal(cart))}</p>
          <p style="font-size:0.9rem;color:#666">Shipping calculated at confirmation.</p>
          <a href="${whatsappOrderLink(cart)}" class="btn btn-primary btn-block" target="_blank" rel="noopener" style="margin-top:16px">Order on WhatsApp</a>
          <a href="contact.html" class="btn btn-outline btn-block" style="margin-top:8px">Contact Us</a>
        </div>
      `;

      root.querySelectorAll('.cart-remove').forEach(btn => {
        btn.onclick = () => { removeFromCart(btn.dataset.key); renderCart(); };
      });
      root.querySelectorAll('.cart-minus').forEach(btn => {
        btn.onclick = () => {
          const item = cart.find(i => i.key === btn.dataset.key);
          updateCartQty(btn.dataset.key, item.qty - 1);
          renderCart();
        };
      });
      root.querySelectorAll('.cart-plus').forEach(btn => {
        btn.onclick = () => {
          const item = cart.find(i => i.key === btn.dataset.key);
          updateCartQty(btn.dataset.key, item.qty + 1);
          renderCart();
        };
      });
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
