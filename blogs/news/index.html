<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Gir Govalan</title>
  <meta name="description" content="Tips and articles about Gir cow ghee, bilona method, and wholesome living from Gir Govalan.">
  <link rel="canonical" href="https://girgovalan.com/blogs/news/">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <div id="site-header"></div>
  <div class="page-hero">
    <div class="container">
      <h1>Blog</h1>
      <p>Tips, stories, and wisdom about Gir cows, bilona ghee, and wholesome living.</p>
    </div>
  </div>
  <section>
    <div class="container blog-grid" id="blog-list"></div>
  </section>
  <div id="site-footer"></div>
  <button class="scroll-top" aria-label="Back to top">↑</button>
  <script src="/js/urls.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/seo.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('blog-list').innerHTML = BLOG_POSTS.map(post => `
      <a href="${URLS.blogPost(post.slug)}" class="blog-card">
        <div class="blog-card-image" style="background-image:url('${post.image}')"></div>
        <div class="blog-card-body">
          <span class="blog-card-date">${new Date(post.date).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })}</span>
          <h3>${post.title}</h3>
          <p style="margin:8px 0 0;font-size:0.9rem">${post.excerpt}</p>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
