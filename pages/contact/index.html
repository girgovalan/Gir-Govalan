<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Gir Govalan</title>
  <meta name="description" content="Contact Gir Govalan for orders, wholesale, and questions about authentic Gir cow ghee and dairy products.">
  <link rel="canonical" href="https://girgovalan.com/pages/contact/">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <div id="site-header"></div>
  <div class="page-hero">
    <div class="container">
      <h1>Contact Us</h1>
      <p id="contact-intro"></p>
    </div>
  </div>
  <section>
    <div class="container contact-grid">
      <form class="contact-form" id="contact-form">
        <div class="field"><label for="name">Name</label><input type="text" id="name" required></div>
        <div class="field"><label for="email">Email</label><input type="email" id="email" required></div>
        <div class="field"><label for="phone">Phone</label><input type="tel" id="phone"></div>
        <div class="field"><label for="message">Message</label><textarea id="message" rows="6" required></textarea></div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
      <div class="contact-info-card" id="contact-info"></div>
    </div>
  </section>
  <div id="site-footer"></div>
  <button class="scroll-top" aria-label="Back to top">↑</button>
  <script src="/js/urls.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('contact-intro').textContent = PAGES.contact.intro;
    document.getElementById('contact-info').innerHTML = `
      <h3>Get in touch</h3>
      <ul>
        <li><strong>Email:</strong> <a href="mailto:${SITE.email}">${SITE.email}</a></li>
        <li><strong>Phone:</strong> <a href="tel:${SITE.phone.replace(/\s/g,'')}">${SITE.phone}</a></li>
        <li><strong>WhatsApp:</strong> <a href="https://wa.me/${SITE.whatsapp}" target="_blank" rel="noopener">Chat on WhatsApp</a></li>
        <li><strong>Address:</strong> ${SITE.address}</li>
      </ul>`;
    document.getElementById('contact-form').addEventListener('submit', e => {
      e.preventDefault();
      const subject = encodeURIComponent('Contact from Gir Govalan website');
      const body = encodeURIComponent(`Name: ${document.getElementById('name').value}\nEmail: ${document.getElementById('email').value}\nPhone: ${document.getElementById('phone').value}\n\n${document.getElementById('message').value}`);
      window.location.href = `mailto:${SITE.email}?subject=${subject}&body=${body}`;
      showToast('Opening your email app…');
    });
  </script>
</body>
</html>
