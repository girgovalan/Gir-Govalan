<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-X9CF28C02R"></script>
  <script src="/js/gtag.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Gir Govalan</title>
  <link rel="canonical" href="https://girgovalan.com/pages/gallery/">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <div id="site-header"></div>
  <div class="page-hero">
    <div class="container">
      <h1>Gallery</h1>
      <p id="gallery-intro"></p>
    </div>
  </div>
  <section>
    <div class="container gallery-grid" id="gallery-grid"></div>
  </section>
  <div id="site-footer"></div>
  <button class="scroll-top" aria-label="Back to top">↑</button>
  <script src="/js/urls.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/seo.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('gallery-intro').textContent = PAGES.gallery.intro;
    document.getElementById('gallery-grid').innerHTML = GALLERY.map(g =>
      `<div class="gallery-item"><img src="${g.src}" alt="${g.alt}" loading="lazy"></div>`
    ).join('');
  </script>
</body>
</html>
